<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>結業證書｜足部結構平衡健康管理師・高階認證</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #8B6914;
      --gold-light: #C9A84C;
      --gold-pale: #E8D5A0;
      --black: #151514;
      --bg: #FDFAF2;
    }

    body {
      background: #9a8a72;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 20px;
      font-family: 'Noto Serif TC', "PingFang TC", serif;
    }

    .certificate {
      width: 297mm;
      min-height: 210mm;
      background: var(--bg);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 52px 68px 48px;
    }

    /* 背景紋理 */
    .certificate::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          45deg,
          rgba(201,168,76,0.04) 0px,
          rgba(201,168,76,0.04) 1px,
          transparent 1px,
          transparent 12px
        ),
        repeating-linear-gradient(
          -45deg,
          rgba(201,168,76,0.04) 0px,
          rgba(201,168,76,0.04) 1px,
          transparent 1px,
          transparent 12px
        );
      pointer-events: none;
    }

    /* 三層框 */
    .border-1 { position: absolute; inset: 10px; border: 2px solid rgba(139,105,20,0.6); pointer-events: none; }
    .border-2 { position: absolute; inset: 15px; border: 0.5px solid rgba(201,168,76,0.5); pointer-events: none; }
    .border-3 { position: absolute; inset: 19px; border: 0.5px solid rgba(139,105,20,0.25); pointer-events: none; }

    /* 角落花紋 */
    .corner-deco {
      position: absolute;
      width: 56px;
      height: 56px;
      pointer-events: none;
    }
    .corner-deco svg { width: 100%; height: 100%; }
    .corner-tl { top: 6px; left: 6px; }
    .corner-tr { top: 6px; right: 6px; transform: scaleX(-1); }
    .corner-bl { bottom: 6px; left: 6px; transform: scaleY(-1); }
    .corner-br { bottom: 6px; right: 6px; transform: scale(-1); }

    /* 浮水印 */
    .watermark {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 480px;
      opacity: 0.035;
      pointer-events: none;
      user-select: none;
    }

    /* 頂部金色裝飾帶 */
    .top-band {
      position: absolute;
      top: 28px;
      left: 28px;
      right: 28px;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold-light), var(--gold), var(--gold-light), transparent);
      pointer-events: none;
    }

    /* 底部金色裝飾帶 */
    .bottom-band {
      position: absolute;
      bottom: 28px;
      left: 28px;
      right: 28px;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold-light), var(--gold), var(--gold-light), transparent);
      pointer-events: none;
    }

    /* 內容 */
    .content {
      position: relative;
      z-index: 2;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo-wrap { margin-bottom: 16px; }
    .logo-wrap img { height: 68px; object-fit: contain; }

    /* 裝飾分隔線 */
    .fancy-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 auto 16px;
      width: 320px;
    }
    .fancy-divider .line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-light));
    }
    .fancy-divider .line.right {
      background: linear-gradient(90deg, var(--gold-light), transparent);
    }
    .fancy-divider .diamond {
      width: 6px;
      height: 6px;
      background: var(--gold-light);
      transform: rotate(45deg);
    }
    .fancy-divider .dot {
      width: 3px;
      height: 3px;
      background: var(--gold);
      border-radius: 50%;
    }

    .cert-eyebrow {
      font-size: 9px;
      letter-spacing: 0.4em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 10px;
      text-align: center;
    }

    .cert-title {
      font-size: 30px;
      font-weight: 700;
      color: var(--black);
      letter-spacing: 0.12em;
      margin-bottom: 6px;
      text-align: center;
    }

    /* 標題裝飾 */
    .title-deco {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .title-deco .side-line {
      width: 40px;
      height: 1px;
      background: var(--gold-light);
    }
    .title-deco .center-mark {
      font-size: 10px;
      color: var(--gold);
      letter-spacing: 0.1em;
    }

    .cert-subtitle {
      font-size: 11px;
      letter-spacing: 0.28em;
      color: var(--gold);
      margin-bottom: 20px;
      text-align: center;
    }

    .cert-body {
      font-size: 12px;
      color: rgba(21,21,20,0.5);
      letter-spacing: 0.1em;
      margin-bottom: 10px;
      text-align: center;
    }

    .student-name {
      font-size: 34px;
      font-weight: 700;
      color: var(--black);
      letter-spacing: 0.15em;
      padding-bottom: 8px;
      margin-bottom: 12px;
      min-width: 280px;
      text-align: center;
      position: relative;
    }
    .student-name::after {
      content: '';
      position: absolute;
      bottom: 0; left: 10%; right: 10%;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
    }

    .cert-desc {
      font-size: 12.5px;
      color: rgba(21,21,20,0.62);
      letter-spacing: 0.06em;
      line-height: 2.1;
      text-align: center;
      margin-bottom: 24px;
      max-width: 520px;
    }
    .cert-desc strong { color: var(--gold); font-weight: 600; }

    /* 底部資訊列 */
    .cert-footer {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 0;
      border-top: 1px solid rgba(139,105,20,0.3);
      padding-top: 20px;
      margin-top: 120px;
      position: relative;
    }

    /* 印章圓形 */
    .seal {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }
    .seal-circle {
      width: 72px;
      height: 72px;
      border: 1.5px solid var(--gold-light);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      background: rgba(201,168,76,0.04);
    }
    .seal-circle::before {
      content: '';
      position: absolute;
      inset: 4px;
      border: 0.5px solid rgba(201,168,76,0.4);
      border-radius: 50%;
    }
    .seal-text-main {
      font-size: 11px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.05em;
      line-height: 1.3;
      text-align: center;
    }
    .seal-text-en {
      font-size: 6px;
      letter-spacing: 0.18em;
      color: rgba(139,105,20,0.6);
      text-align: center;
    }

    .cert-footer-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .cert-footer-item:not(:last-child) {
      border-right: 1px solid rgba(139,105,20,0.2);
    }

    .footer-label {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
    }
    .footer-value {
      font-size: 15px;
      color: var(--black);
      letter-spacing: 0.06em;
      font-weight: 500;
    }

    /* 列印 */
    @media print {
      body { background: white; padding: 0; }
      .certificate { width: 297mm; height: 210mm; box-shadow: none; }
      .control-bar { display: none; }
      body { padding-top: 0; }
    }

    /* 控制列 */
    .control-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #1a1508;
      padding: 12px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 100;
      border-bottom: 1px solid rgba(201,168,76,0.3);
    }
    .control-bar label {
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--gold-light);
      white-space: nowrap;
      font-family: -apple-system, "PingFang TC", sans-serif;
    }
    .control-bar input {
      flex: 1;
      max-width: 280px;
      padding: 8px 14px;
      font-size: 14px;
      font-family: 'Noto Serif TC', "PingFang TC", serif;
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.35);
      color: #fff;
      letter-spacing: 0.08em;
      outline: none;
    }
    .control-bar input::placeholder { color: rgba(255,255,255,0.2); }
    .control-bar input:focus { border-color: var(--gold-light); }
    .print-btn {
      background: var(--gold);
      color: #fff;
      border: none;
      padding: 8px 20px;
      font-size: 11px;
      letter-spacing: 0.18em;
      cursor: pointer;
      font-family: -apple-system, "PingFang TC", sans-serif;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .print-btn:hover { background: var(--gold-light); color: var(--black); }
    body { padding-top: 90px; }
  </style>
</head>
<body>

  <div class="certificate">
    <!-- 框線 -->
    <div class="border-1"></div>
    <div class="border-2"></div>
    <div class="border-3"></div>

    <!-- 角落花紋 -->
    <div class="corner-deco corner-tl">
      <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 4 L4 24 M4 4 L24 4" stroke="#C9A84C" stroke-width="1.5"/>
        <path d="M10 10 L10 20 M10 10 L20 10" stroke="#C9A84C" stroke-width="0.5" opacity="0.5"/>
        <circle cx="4" cy="4" r="2" fill="#C9A84C" opacity="0.6"/>
        <circle cx="14" cy="4" r="1" fill="#C9A84C" opacity="0.3"/>
        <circle cx="4" cy="14" r="1" fill="#C9A84C" opacity="0.3"/>
        <path d="M4 30 Q12 20 20 12" stroke="#C9A84C" stroke-width="0.5" opacity="0.3" fill="none"/>
      </svg>
    </div>
    <div class="corner-deco corner-tr">
      <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 4 L4 24 M4 4 L24 4" stroke="#C9A84C" stroke-width="1.5"/>
        <path d="M10 10 L10 20 M10 10 L20 10" stroke="#C9A84C" stroke-width="0.5" opacity="0.5"/>
        <circle cx="4" cy="4" r="2" fill="#C9A84C" opacity="0.6"/>
        <circle cx="14" cy="4" r="1" fill="#C9A84C" opacity="0.3"/>
        <circle cx="4" cy="14" r="1" fill="#C9A84C" opacity="0.3"/>
        <path d="M4 30 Q12 20 20 12" stroke="#C9A84C" stroke-width="0.5" opacity="0.3" fill="none"/>
      </svg>
    </div>
    <div class="corner-deco corner-bl">
      <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 4 L4 24 M4 4 L24 4" stroke="#C9A84C" stroke-width="1.5"/>
        <path d="M10 10 L10 20 M10 10 L20 10" stroke="#C9A84C" stroke-width="0.5" opacity="0.5"/>
        <circle cx="4" cy="4" r="2" fill="#C9A84C" opacity="0.6"/>
        <circle cx="14" cy="4" r="1" fill="#C9A84C" opacity="0.3"/>
        <circle cx="4" cy="14" r="1" fill="#C9A84C" opacity="0.3"/>
        <path d="M4 30 Q12 20 20 12" stroke="#C9A84C" stroke-width="0.5" opacity="0.3" fill="none"/>
      </svg>
    </div>
    <div class="corner-deco corner-br">
      <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 4 L4 24 M4 4 L24 4" stroke="#C9A84C" stroke-width="1.5"/>
        <path d="M10 10 L10 20 M10 10 L20 10" stroke="#C9A84C" stroke-width="0.5" opacity="0.5"/>
        <circle cx="4" cy="4" r="2" fill="#C9A84C" opacity="0.6"/>
        <circle cx="14" cy="4" r="1" fill="#C9A84C" opacity="0.3"/>
        <circle cx="4" cy="14" r="1" fill="#C9A84C" opacity="0.3"/>
        <path d="M4 30 Q12 20 20 12" stroke="#C9A84C" stroke-width="0.5" opacity="0.3" fill="none"/>
      </svg>
    </div>

    <!-- 頂底裝飾帶 -->
    <div class="top-band"></div>
    <div class="bottom-band"></div>

    <!-- 浮水印 -->
    <img class="watermark" src="logo-watermark.png" alt="">

    <div class="content">

      <div class="logo-wrap">
        <img src="logo.png" alt="結構X獵人 STRxHunter">
      </div>

      <div class="fancy-divider">
        <div class="line"></div>
        <div class="dot"></div>
        <div class="diamond"></div>
        <div class="dot"></div>
        <div class="line right"></div>
      </div>

      <p class="cert-eyebrow">Certificate of Completion · Master Level</p>
      <h1 class="cert-title">結　業　證　書</h1>

      <div class="title-deco">
        <div class="side-line"></div>
        <div class="center-mark">足部結構平衡健康管理師・高階認證</div>
        <div class="side-line"></div>
      </div>

      <p class="cert-body" style="margin-bottom:10px;">茲證明</p>

      <div class="student-name" id="studentName">學員姓名</div>

      <p class="cert-desc">
        已完成 <strong>足部結構平衡健康管理師・高階認證課程</strong><br>
        共計 15 小時 / 3 天，具備全人結構力學整合評估、高階下肢結構還原技術、<br>
        系統化全身性代償分析及個案管理系統建立之專業知能，<br>
        特頒此證書以茲證明，並具備晉升正式講師及區域認證經銷商資格。
      </p>

      <div class="cert-footer">
        <div class="cert-footer-item">
          <span class="footer-label">結業日期</span>
          <span class="footer-value" id="certDate">2026 年 __ 月 __ 日</span>
        </div>
        <div class="cert-footer-item">
          <span class="footer-label">發證單位</span>
          <div class="seal">
            <div class="seal-circle">
              <span class="seal-text-main">結構 X 獵人</span>
              <span class="seal-text-en">STRxHunter</span>
            </div>
          </div>
        </div>
        <div class="cert-footer-item">
          <span class="footer-label">授課老師</span>
          <span class="footer-value" id="teacherName">　</span>
        </div>
        <div class="cert-footer-item">
          <span class="footer-label">證書編號</span>
          <span class="footer-value" id="certNo">STR-2026-A0001-0001</span>
        </div>
      </div>

    </div>
  </div>

  <div class="control-bar">
    <label>學員姓名</label>
    <input type="text" id="nameInput" placeholder="輸入學員姓名" oninput="updateName(this.value)">
    <label>結業日期</label>
    <input type="date" id="dateInput" oninput="updateDate(this.value)" style="max-width:160px;">
    <label>授課老師</label>
    <input type="text" id="teacherInput" placeholder="授課老師姓名" oninput="updateTeacher(this.value)" style="max-width:160px;">
    <label>證書編號</label>
    <input type="text" id="certInput" placeholder="STR-2026-A0001-0001" oninput="updateCert(this.value)" style="max-width:190px;">
    <button class="print-btn" onclick="window.print()">列印 / 存 PDF</button>
  </div>

  <script>
    function updateName(val) { document.getElementById('studentName').textContent = val || '學員姓名'; }
    function updateDate(val) {
      if (!val) return;
      const d = new Date(val);
      document.getElementById('certDate').textContent = `${d.getFullYear()} 年 ${d.getMonth()+1} 月 ${d.getDate()} 日`;
    }
    function updateTeacher(val) { document.getElementById('teacherName').textContent = val || '　'; }
    function updateCert(val) { document.getElementById('certNo').textContent = val || 'STR-2026-A0001-0001'; }

    const today = new Date();
    document.getElementById('dateInput').value = today.toISOString().split('T')[0];
    updateDate(today.toISOString().split('T')[0]);
  </script>

</body>
</html>
